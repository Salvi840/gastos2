<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos Familiares</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/exceljs@4.3.0/dist/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--surface:#fff;--surface2:#f0f0ee;
  --border:#e4e4e2;--border2:#d0d0ce;
  --text:#1a1a18;--text2:#6b6b68;--text3:#9b9b98;
  --accent:#0f6e56;--accent-dark:#0a5540;
  --red:#a32d2d;--red-bg:#fdf0f0;
  --radius:10px;--radius-sm:6px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#161614;--surface:#1f1f1d;--surface2:#2a2a28;
  --border:#2e2e2c;--border2:#3a3a38;
  --text:#f0f0ee;--text2:#9b9b98;--text3:#6b6b68;
  --accent:#1d9e75;--accent-dark:#15b582;
  --red:#e05555;--red-bg:#2a1414;
}}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}

.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem;width:100%;max-width:380px}
.auth-logo{width:42px;height:42px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem}
.auth-logo svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.auth-tabs{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:1.5rem}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:color .15s,border-color .15s}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.auth-tab:hover:not(.active){color:var(--text)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.field input,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color .15s;cursor:pointer}
.field input:focus,.field select:focus{border-color:var(--accent)}
.hint{font-size:12px;color:var(--text3);margin-top:5px}
.btn-main{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;margin-top:4px}
.btn-main:hover{background:var(--accent-dark)}
.btn-main:disabled{opacity:0.5;cursor:not-allowed}
.err-box{font-size:12px;color:var(--red);margin-top:10px;padding:8px 10px;background:var(--red-bg);border-radius:var(--radius-sm);display:none}
.ok-box{font-size:12px;color:var(--accent);margin-top:10px;padding:8px 10px;background:#e8f5f1;border-radius:var(--radius-sm);display:none}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

.app{display:none;max-width:780px;margin:0 auto;padding:2rem 1.25rem 4rem}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:22px;font-weight:600}
.hdr p{font-size:13px;color:var(--text2);margin-top:2px}
.hdr-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.btn:hover{background:var(--surface2)}
.btn-out{color:var(--text2);border-color:var(--border)}
.btn-out:hover{color:var(--red);border-color:var(--red);background:var(--red-bg)}

/* Sync indicator */
.sync-dot{width:8px;height:8px;border-radius:50%;background:#9b9b98;display:inline-block;margin-right:4px;transition:background .3s}
.sync-dot.live{background:#1d9e75}
.sync-dot.syncing{background:#ba7517;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-label{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
@media(max-width:520px){.cards{grid-template-columns:1fr 1fr}.cards .card:first-child{grid-column:1/-1}}
.card{background:var(--surface2);border-radius:var(--radius);padding:1rem 1.1rem}
.card-lbl{font-size:12px;color:var(--text2);margin-bottom:5px}
.card-val{font-size:20px;font-weight:600}
.card-s{font-size:12px;margin-top:3px;font-weight:500}
.sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.5rem}
.sec-t{font-size:14px;font-weight:600;margin-bottom:2px}
.sec-s{font-size:12px;color:var(--text2);margin-bottom:14px}
.chart-wrap{position:relative;height:190px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}}
.btn-add{width:100%;padding:11px;border:none;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-add:hover{background:var(--accent-dark)}
.btn-add:disabled{opacity:0.5;cursor:not-allowed}
.form-err{color:var(--red);font-size:12px;margin-top:8px;display:none}
.tbl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:480px}
thead tr{border-bottom:1.5px solid var(--border)}
th{padding:10px 14px;font-size:12px;font-weight:600;color:var(--text2);text-align:left}
td{padding:10px 14px;font-size:14px}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
.badge{font-size:11px;padding:3px 9px;border-radius:100px;font-weight:600;display:inline-block;white-space:nowrap}
.del{border:none;background:none;cursor:pointer;color:var(--text3);font-size:20px;line-height:1;padding:2px 6px;border-radius:4px;display:flex;align-items:center}
.del:hover{color:var(--red);background:var(--red-bg)}
.empty{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px}
.loading{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center;gap:10px}
.load-spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
</style>
</head>
<body>

<div class="auth-wrap" id="scr-auth">
  <div class="auth-card">
    <div class="auth-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Crear cuenta</div>
    </div>
    <div id="form-login">
      <div class="field"><label>Usuario</label><input type="text" id="li-user" placeholder="Tu usuario" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="li-pass" placeholder="Tu contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <button class="btn-main" onclick="doLogin()" id="li-btn"><span id="li-txt">Ingresar</span><div class="spinner" id="li-spin"></div></button>
      <div class="err-box" id="li-err"></div>
    </div>
    <div id="form-register" style="display:none">
      <div class="field"><label>Usuario</label><input type="text" id="re-user" placeholder="Elegí un usuario" autocomplete="username"></div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="re-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        <div class="hint">Se guarda encriptada. Compartí estas credenciales con tu familia.</div>
      </div>
      <div class="field"><label>Confirmar contraseña</label><input type="password" id="re-pass2" autocomplete="new-password"></div>
      <button class="btn-main" onclick="doRegister()" id="re-btn"><span id="re-txt">Crear cuenta</span><div class="spinner" id="re-spin"></div></button>
      <div class="err-box" id="re-err"></div>
      <div class="ok-box" id="re-ok"></div>
    </div>
  </div>
</div>

<div class="app" id="scr-app">
  <div class="hdr">
    <div>
      <h1>Gastos familiares</h1>
      <div class="sync-label"><span class="sync-dot" id="sync-dot"></span><span id="sync-txt">Conectando...</span></div>
    </div>
    <div class="hdr-btns">
      <button class="btn" onclick="exportExcel()">↓ Excel</button>
      <button class="btn" onclick="exportPDF()">↓ PDF</button>
      <button class="btn btn-out" onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="cards" id="summary"></div>
  <div class="sec" id="chart-sec" style="display:none">
    <p class="sec-t">Evolución mensual</p>
    <p class="sec-s">Variación respecto al mes anterior</p>
    <div class="chart-wrap"><canvas id="myChart"></canvas></div>
  </div>
  <div class="sec">
    <p class="sec-t" style="margin-bottom:12px">Agregar gasto</p>
    <div class="form-grid">
      <div class="field"><label>Descripción</label><input type="text" id="desc" placeholder="Ej: Almuerzo"></div>
      <div class="field"><label>Monto ($)</label><input type="number" id="monto" placeholder="0.00" min="0" step="0.01"></div>
      <div class="field"><label>Categoría</label>
        <select id="cat">
          <option>Comida</option><option>Transporte</option><option>Servicios</option>
          <option>Salud</option><option>Entretenimiento</option><option>Ropa</option>
          <option>Hogar</option><option>Otros</option>
        </select>
      </div>
      <div class="field"><label>Fecha</label><input type="date" id="fecha"></div>
    </div>
    <button class="btn-add" onclick="addGasto()" id="add-btn">Agregar gasto</button>
    <p class="form-err" id="form-err"></p>
  </div>
  <div class="tbl-card"><div class="tbl-wrap" id="tbl"></div></div>
</div>

<script>
const SUPABASE_URL='https://laakrjsrhhgqzvwuyhip.supabase.co';
const SUPABASE_KEY='sb_publishable_m_quaLcEQi0m48zNB6hufw_gzAqFLl5';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const CAT_HEX={Comida:'0F6E56',Transporte:'185FA5',Servicios:'BA7517',Salud:'A32D2D',Entretenimiento:'534AB7',Ropa:'993556',Hogar:'3B6D11',Otros:'5F5E5A'};
const COLORS={Comida:['#e8f5f1','#0f6e56'],Transporte:['#e6f1fb','#185fa5'],Servicios:['#faeeda','#ba7517'],Salud:['#fcebeb','#a32d2d'],Entretenimiento:['#eeedfe','#534ab7'],Ropa:['#fbeaf0','#993556'],Hogar:['#eaf3de','#3b6d11'],Otros:['#f1efe8','#5f5e5a']};
let gastos=[],chartInst=null,me=null,realtimeSub=null;

async function sha256(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}

function setSyncStatus(state){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-txt');
  if(state==='live'){dot.className='sync-dot live';txt.textContent='En vivo — cambios sincronizados';}
  else if(state==='syncing'){dot.className='sync-dot syncing';txt.textContent='Sincronizando...';}
  else{dot.className='sync-dot';txt.textContent='Sin conexión';}
}

function switchTab(tab){
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
  document.getElementById('form-login').style.display=tab==='login'?'block':'none';
  document.getElementById('form-register').style.display=tab==='register'?'block':'none';
  ['li-err','re-err','re-ok'].forEach(hideMsg);
}

function setLoad(p,on){document.getElementById(p+'-btn').disabled=on;document.getElementById(p+'-txt').style.opacity=on?0:1;document.getElementById(p+'-spin').style.display=on?'block':'none';}
function showMsg(id,msg,ok=false){const e=document.getElementById(id);e.textContent=msg;e.style.display='block';}
function hideMsg(id){document.getElementById(id).style.display='none';}

async function doLogin(){
  const user=document.getElementById('li-user').value.trim();
  const pass=document.getElementById('li-pass').value;
  hideMsg('li-err');
  if(!user||!pass){showMsg('li-err','Completá usuario y contraseña.');return;}
  setLoad('li',true);
  const hash=await sha256(user.toLowerCase()+':'+pass);
  const{data,error}=await db.from('usuarios').select('username').eq('username',user.toLowerCase()).eq('hash',hash).maybeSingle();
  setLoad('li',false);
  if(error||!data){showMsg('li-err','Usuario o contraseña incorrectos.');return;}
  startSession(data.username);
}

async function doRegister(){
  const user=document.getElementById('re-user').value.trim();
  const pass=document.getElementById('re-pass').value;
  const pass2=document.getElementById('re-pass2').value;
  ['re-err','re-ok'].forEach(hideMsg);
  if(user.length<2){showMsg('re-err','El usuario debe tener al menos 2 caracteres.');return;}
  if(/\s/.test(user)){showMsg('re-err','El usuario no puede tener espacios.');return;}
  if(pass.length<6){showMsg('re-err','La contraseña debe tener al menos 6 caracteres.');return;}
  if(pass!==pass2){showMsg('re-err','Las contraseñas no coinciden.');return;}
  setLoad('re',true);
  const{data:exists}=await db.from('usuarios').select('username').eq('username',user.toLowerCase()).maybeSingle();
  if(exists){setLoad('re',false);showMsg('re-err','Ese usuario ya existe.');return;}
  const hash=await sha256(user.toLowerCase()+':'+pass);
  const{error}=await db.from('usuarios').insert([{username:user.toLowerCase(),hash}]);
  setLoad('re',false);
  if(error){showMsg('re-err','Error al crear la cuenta. Intentá de nuevo.');return;}
  showMsg('re-ok','¡Cuenta creada! Iniciando sesión...');
  await new Promise(r=>setTimeout(r,900));
  startSession(user.toLowerCase());
}

function startSession(user){
  me=user;
  sessionStorage.setItem('sess',user);
  document.getElementById('scr-auth').style.display='none';
  document.getElementById('scr-app').style.display='block';
  loadData();
  subscribeRealtime();
}

function logout(){
  sessionStorage.removeItem('sess');
  if(realtimeSub){db.removeChannel(realtimeSub);realtimeSub=null;}
  me=null;gastos=[];
  if(chartInst){chartInst.destroy();chartInst=null;}
  document.getElementById('li-user').value='';
  document.getElementById('li-pass').value='';
  document.getElementById('scr-app').style.display='none';
  document.getElementById('scr-auth').style.display='flex';
  switchTab('login');
}

async function init(){
  const sess=sessionStorage.getItem('sess');
  if(sess){
    const{data}=await db.from('usuarios').select('username').eq('username',sess).maybeSingle();
    if(data){startSession(sess);return;}
    sessionStorage.removeItem('sess');
  }
  document.getElementById('scr-auth').style.display='flex';
}

async function loadData(){
  document.getElementById('tbl').innerHTML='<div class="loading"><div class="load-spin"></div>Cargando gastos...</div>';
  setSyncStatus('syncing');
  const{data,error}=await db.from('gastos').select('*').order('fecha',{ascending:false}).order('id',{ascending:false});
  if(error){document.getElementById('tbl').innerHTML='<div class="empty">Error al cargar los gastos.</div>';setSyncStatus('offline');return;}
  gastos=data||[];
  setToday();render();setSyncStatus('live');
}

function subscribeRealtime(){
  realtimeSub=db.channel('gastos-sync')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'gastos'},payload=>{
      if(!gastos.find(g=>g.id===payload.new.id)){
        gastos.unshift(payload.new);
        gastos.sort((a,b)=>b.fecha.localeCompare(a.fecha)||b.id-a.id);
        render();setSyncStatus('live');
      }
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'gastos'},payload=>{
      gastos=gastos.filter(g=>g.id!==payload.old.id);
      render();setSyncStatus('live');
    })
    .subscribe(status=>{
      if(status==='SUBSCRIBED')setSyncStatus('live');
      else if(status==='CLOSED'||status==='CHANNEL_ERROR')setSyncStatus('offline');
    });
}

function fmt(n){return '$'+n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtF(f){const[y,m,d]=f.split('-');return`${d}/${m}/${y}`;}
function setToday(){const e=document.getElementById('fecha');if(e)e.value=new Date().toISOString().split('T')[0];}

function getMonthly(){
  const map={};
  gastos.forEach(g=>{const k=g.fecha.slice(0,7);map[k]=(map[k]||0)+g.monto;});
  const keys=Object.keys(map).sort();
  return keys.map((k,i)=>{
    const prev=i>0?map[keys[i-1]]:null;
    const pct=prev!==null?((map[k]-prev)/prev*100):null;
    const[y,m]=k.split('-');
    const label=new Date(+y,+m-1,1).toLocaleDateString('es-AR',{month:'short',year:'2-digit'});
    return{key:k,label,total:map[k],pct};
  });
}

function getStats(){
  const total=gastos.reduce((a,g)=>a+g.monto,0);
  const bycat={},bycat_count={};
  gastos.forEach(g=>{bycat[g.categoria]=(bycat[g.categoria]||0)+g.monto;bycat_count[g.categoria]=(bycat_count[g.categoria]||0)+1;});
  const monthly=getMonthly();
  const avgMonthly=monthly.length?total/monthly.length:0;
  const avgPerGasto=gastos.length?total/gastos.length:0;
  const topcat=Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  return{total,bycat,bycat_count,monthly,avgMonthly,avgPerGasto,topcat};
}

async function addGasto(){
  const desc=document.getElementById('desc').value.trim();
  const monto=parseFloat(document.getElementById('monto').value);
  const cat=document.getElementById('cat').value;
  const fecha=document.getElementById('fecha').value;
  const err=document.getElementById('form-err');
  if(!desc||isNaN(monto)||monto<=0||!fecha){err.textContent='Completá todos los campos.';err.style.display='block';return;}
  err.style.display='none';
  const btn=document.getElementById('add-btn');btn.disabled=true;btn.textContent='Guardando...';
  setSyncStatus('syncing');
  const{error}=await db.from('gastos').insert([{id:Date.now(),usuario:me,descripcion:desc,monto,categoria:cat,fecha}]);
  btn.disabled=false;btn.textContent='Agregar gasto';
  if(error){err.textContent='Error al guardar. Intentá de nuevo.';err.style.display='block';setSyncStatus('offline');return;}
  document.getElementById('desc').value='';document.getElementById('monto').value='';setToday();
}

async function deleteGasto(id){
  if(!confirm('¿Eliminar este gasto?'))return;
  setSyncStatus('syncing');
  const{error}=await db.from('gastos').delete().eq('id',id);
  if(error){alert('Error al eliminar.');setSyncStatus('offline');}
}

function render(){renderSummary();renderChart();renderTable();}

function renderSummary(){
  const{total,topcat,monthly}=getStats();
  const last=monthly.length?monthly[monthly.length-1]:null;
  const top=topcat[0];
  const pctHtml=last&&last.pct!==null?`<div class="card-s" style="color:${last.pct>0?'var(--red)':'var(--accent)'}">${last.pct>0?'+':''}${last.pct.toFixed(1)}% vs mes anterior</div>`:'';
  document.getElementById('summary').innerHTML=`
    <div class="card"><div class="card-lbl">Total acumulado</div><div class="card-val">${fmt(total)}</div></div>
    <div class="card"><div class="card-lbl">Este mes</div><div class="card-val">${last?fmt(last.total):fmt(0)}</div>${pctHtml}</div>
    <div class="card"><div class="card-lbl">Mayor categoría</div><div class="card-val" style="font-size:16px">${top?top[0]:'—'}</div>${top?`<div class="card-s" style="color:var(--text2)">${fmt(top[1])}</div>`:''}</div>`;
}

function renderChart(){
  const monthly=getMonthly();
  const sec=document.getElementById('chart-sec');
  if(monthly.length<2){sec.style.display='none';return;}
  sec.style.display='block';
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const tc=isDark?'rgba(240,240,238,0.45)':'rgba(26,26,24,0.4)';
  const gc=isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';
  const pctPlugin={id:'pct',afterDatasetsDraw(chart){
    const{ctx,scales:{x,y}}=chart;ctx.save();
    monthly.forEach((m,i)=>{
      if(m.pct===null)return;
      const xp=x.getPixelForValue(i),yp=y.getPixelForValue(m.total);
      const up=m.pct>0,label=(up?'+':'')+m.pct.toFixed(1)+'%';
      ctx.font='600 10px DM Sans,system-ui';
      const tw=ctx.measureText(label).width+14;
      ctx.fillStyle=up?'rgba(163,45,45,0.12)':'rgba(15,110,86,0.12)';
      ctx.beginPath();ctx.roundRect(xp-tw/2,yp-22,tw,18,4);ctx.fill();
      ctx.fillStyle=up?'#a32d2d':isDark?'#1d9e75':'#0f6e56';
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,xp,yp-13);
    });
    ctx.restore();
  }};
  if(chartInst)chartInst.destroy();
  chartInst=new Chart(document.getElementById('myChart'),{
    type:'bar',
    data:{labels:monthly.map(m=>m.label),datasets:[{data:monthly.map(m=>m.total),
      backgroundColor:isDark?'rgba(29,158,117,0.3)':'rgba(15,110,86,0.15)',
      borderColor:isDark?'#1d9e75':'#0f6e56',borderWidth:1.5,borderRadius:5,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:30}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.parsed.y)},backgroundColor:isDark?'#2a2a28':'#1a1a18',padding:10,cornerRadius:6}},
      scales:{x:{grid:{display:false},ticks:{color:tc,font:{size:11}}},
        y:{grid:{color:gc},ticks:{color:tc,font:{size:11},callback:v=>'$'+Number(v).toLocaleString('es-AR')},border:{display:false}}}},
    plugins:[pctPlugin]});
}

function renderTable(){
  const el=document.getElementById('tbl');

  el.innerHTML=`<table>
    <thead><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th style="text-align:right">Monto</th><th></th></tr></thead>
    <tbody>${gastos.map(g=>{const[bg,fc]=COLORS[g.categoria]||['#f1efe8','#5f5e5a'];return`<tr>

}
